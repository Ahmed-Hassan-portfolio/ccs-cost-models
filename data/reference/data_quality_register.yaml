# Data Quality Register — Van der Spek 2019 Pedigree Matrix
#
# Each data source used in the CCS cost model is scored on 5 dimensions
# (0-4 scale) from van der Spek, Roussanaly & Rubin (2019), Tables B1-B3:
#
#   1. theoretical_understanding: 0=crude speculation → 4=well-established theory
#   2. methodological_rigor:      0=no discernible rigor → 4=best available practice
#   3. validation:                0=no validation → 4=compared with independent data
#   4. modeling_resources:        0=no expertise → 4=expert from multiple practitioners
#   5. empirical_basis:           0=incomplete data → 4=large sample, representative
#
# Flag: "LOW CONFIDENCE" when any dimension scores ≤1.
#
# Reference: van der Spek M, Roussanaly S, Rubin ES (2019). Best practices
#   and guidelines for large scale cost of CCS. Int J Greenh Gas Control 83:142-157.

data_quality:

  # =========================================================================
  # WELL COSTS
  # =========================================================================

  - source: "SBBU Rev B (Sangesland 2013)"
    used_for: "Well drilling time model — activity-based section timing"
    scores:
      theoretical_understanding: 4  # well-established drilling engineering fundamentals
      methodological_rigor: 3       # industry-standard activity-based approach
      validation: 3                 # validated against NCS injection wells (Sodir)
      modeling_resources: 3         # single expert practitioner (NTNU-IPT)
      empirical_basis: 2            # calibrated to limited NCS training dataset
    average: 3.0
    flag: null

  - source: "IEAGHG 2005/2 (TNO)"
    used_for: "European well cost regression — depth-based offshore injection wells"
    scores:
      theoretical_understanding: 3  # empirical regression on established cost drivers
      methodological_rigor: 3       # structured regression, documented methodology
      validation: 2                 # validated within original dataset only
      modeling_resources: 4         # TNO consortium with oil industry data access
      empirical_basis: 2            # European dataset, but pre-2005 vintage
    average: 2.8
    flag: null

  - source: "IEAGHG 2018-08"
    used_for: "CRA material multipliers (13Cr/22Cr/25Cr), CO2-resistant cement premium"
    scores:
      theoretical_understanding: 4  # metallurgy and CO2 corrosion well understood
      methodological_rigor: 3       # systematic review of CRA pricing
      validation: 2                 # compared with supplier quotes, not independent study
      modeling_resources: 3         # IEAGHG technical review committee
      empirical_basis: 2            # supplier catalog data, limited market sample
    average: 2.8
    flag: null

  - source: "Argus Pipe Logix (2025)"
    used_for: "Carbon steel OCTG base price ($2,285/tonne)"
    scores:
      theoretical_understanding: 4  # commodity pricing, transparent
      methodological_rigor: 4       # industry-standard price reporting
      validation: 4                 # cross-checked with market data
      modeling_resources: 4         # professional commodity intelligence
      empirical_basis: 3            # spot price snapshot, subject to volatility
    average: 3.8
    flag: null

  - source: "Aker Solutions / Northern Lights Phase 1"
    used_for: "Subsea XT and wellhead costs (NL contract)"
    scores:
      theoretical_understanding: 3  # actual contract prices, not theoretical
      methodological_rigor: 3       # real procurement, but limited cost breakdown
      validation: 3                 # actual project costs (realized)
      modeling_resources: 3         # Equinor/TotalEnergies/Shell consortium
      empirical_basis: 1            # n=1 project (Northern Lights only)
    average: 2.6
    flag: "LOW CONFIDENCE"  # empirical_basis ≤1

  - source: "Sodir FactPages 2025"
    used_for: "NCS injection well duration calibration (920 wells), percentile bands"
    scores:
      theoretical_understanding: 3  # operational data, no theoretical model
      methodological_rigor: 4       # regulatory reporting, standardized format
      validation: 4                 # official government database, audited
      modeling_resources: 4         # Norwegian Offshore Directorate
      empirical_basis: 4            # 920 injection wells across NCS
    average: 3.8
    flag: null

  - source: "Khosravanian & Aadnoy (2021)"
    used_for: "35-activity WBS for well construction, PERT distributions"
    scores:
      theoretical_understanding: 4  # well-established WBS methodology
      methodological_rigor: 4       # textbook-level engineering reference
      validation: 2                 # limited independent validation of PERT parameters
      modeling_resources: 4         # established drilling engineering authors
      empirical_basis: 2            # generic activity splits, not CCS-specific
    average: 3.2
    flag: null

