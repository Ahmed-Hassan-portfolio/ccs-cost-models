# CCS Reference Wells — Oliasoft WellDesign + Sodir Calibration
# Created: 2026-03-21, Updated: 2026-03-22
# All wells under: Norway / Smeahia / alpha / CCS1 / T1 in Oliasoft WellDesign
# Oliasoft instance: https://welldesign.oliasoft.com/896
# Forecast instance: https://forecast.oliasoft.com

# CALIBRATION SOURCE: Sodir FactPages — 920 NCS injection wells (1970-2025)
# See: data/sodir/well-durations/duration-statistics.md
# CO2 well benchmarks: Sleipner (22d), Snohvit (40-45d), Northern Lights (23-33d)
# CO2 wells perform at P10-P25 of general injection well population

# NOTE: No CRA (25Cr super duplex) grades available in Oliasoft library.
# All production casings use Q-125 carbon steel. Apply cra_factor to production
# casing + tubing costs per implementation plan §3.2.
#
# CRA MATERIAL COST MULTIPLIERS (source: IEAGHG 2018-08, Table 2):
#   13Cr   = 3x carbon steel (L80)
#   22Cr duplex = 4-5x carbon steel
#   25Cr super duplex = 5-6x carbon steel  ← for CO2 injection wells
#   Alloy 625 = 10x carbon steel
#   CO2-resistant cement = +25% vs standard cement
#
# Impact on TOTAL well cost: production casing + tubing is ~15-20% of well cost.
# At 5-6x material multiplier on that fraction: total well cost impact = 1.15-1.25x
# Implementation plan cra_factor (1.35) is slightly high — covers material + fabrication premium.
# Recommended range: 1.15-1.35 (material only: 1.15-1.25, with fabrication: 1.25-1.35)

# NOTE: Oliasoft Forecast gave 11 days / $3.8M for RW-2 — this is ~40% of realistic
# time because the activity model only had 12 activities (drill/case/cement × 4 sections).
# A real well has 50-80 activities (tripping, BOP, logging, completion, NPT, etc.).
# Use Sodir percentile bands below as the authoritative time calibration.

rw1_utsira_shallow:
  description: Shallow Utsira formation, lower bound reference
  analog: Sleipner 15/9-A-16 (TVD 1,164m, 22 days, 82m WD)
  oliasoft:
    design_name: RW1-Utsira-Shallow
    design_id: 49722
    url: https://welldesign.oliasoft.com/896/casing/49722/design
    forecast_estimate: RW1-Cost-Estimate
    temp_sim: CO2 injection + shut-in (Pure CO2)
  well_config:
    configuration: Offshore
    drilling_unit: Semi / Floater
    water_depth_m: 100
    air_gap_m: 25
    wellhead_depth_rkb_m: 125
  trajectory:
    type: vertical
    target_tvd_m: 1000
    total_md_rkb_m: 1125
    inclination_deg: 0
  formation:
    pore_pressure_gradient_sg: 0.951
    temperature_gradient_c_per_100m: 3.75
    seabed_temp_c: 4
    drill_floor_temp_c: 20
    temperature_at_td_c: 37.75  # T = 4 + 3.75*(1000-100)/100
    reservoir_pressure_bar: 93  # 0.951 SG * 0.0981 * 1000m TVD
  casing_program:
    n_sections: 3  # no intermediate — shallow well
    sections:
      - name: Conductor
        casing_size_in: 30
        hole_size_in: 36
        shoe_depth_md_m: 225
        grade: X-56
        weight_ppf: 309.7
        mud_weight_sg: 1.03
      - name: Surface
        casing_size_in: 20
        hole_size_in: 26
        shoe_depth_md_m: 425
        grade: K-55
        weight_ppf: 133
        mud_weight_sg: 1.10
        cement_top_md_m: 125
      - name: Production
        casing_size_in: 9.625
        hole_size_in: 12.25
        shoe_depth_md_m: 1125
        grade: Q-125  # 25Cr super duplex in reality — apply cra_factor
        weight_ppf: 53.5
        mud_weight_sg: 1.15
        cement_top_md_m: 325
  drilling_duration:
    source: Sodir FactPages — NCS injection wells, TVD 1,000-2,000m (n=107)
    co2_benchmark: Sleipner 15/9-A-16 — 22 days (TVD 1,164m, 82m WD, 1996, NOTE MD=3752m deviated)
    p10_days: 10
    p25_days: 16
    p50_days: 22
    p75_days: 52
    p90_days: 135
    recommended_co2_p50_days: 15  # shallower than Sleipner; vertical well should be faster
    oliasoft_forecast_days: 11  # from Oliasoft — understated, only 12 activities modeled
    oliasoft_forecast_mc:
      mean_days: 16.4
      p10_days: 16.1
      p90_days: 16.7
      n_activities: 30
      n_sections: 3  # no intermediate (shallow well)
      date: 2026-03-23

