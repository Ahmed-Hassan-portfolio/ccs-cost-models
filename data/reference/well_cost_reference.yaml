# ============================================================================
# CALIBRATION SUMMARY
# ============================================================================
#
# Real NCS CO2 injection wells (from Sodir FactPages):
#
# | Well                 | Year | TVD (m) | WD (m) | Duration (days) | Project         |
# |----------------------|------|---------|--------|-----------------|-----------------|
# | 15/9-A-16            | 1996 | 1,164   | 82     | 22              | Sleipner        |
# | 7121/4-F-2 H         | 2004 | 2,795   | 318    | 45              | Snohvit         |
# | 7121/4-G-4 H         | 2016 | 2,636   | 316    | 40              | Snohvit         |
# | 31/5-A-7 AH          | 2022 | 2,818   | 307    | 23              | Northern Lights |
# | 31/5-C-1 H           | 2022 | 2,935   | 307    | 33              | Northern Lights |
#
# CO2 wells consistently perform at P10-P25 of the general NCS injection well
# population for their depth range. This reflects: purpose-built wells, known
# formations, dedicated rig campaigns, vertical/low-deviation trajectories.
#
# Sodir data source: data/sodir/well-durations/ (920 injection wells, NLOD 2.0)
# ============================================================================
