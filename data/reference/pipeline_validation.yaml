# Pipeline Model Validation Results
# Knoope 2014 Detailed Model vs Independent Benchmarks
# Generated: 2026-03-27
# Model base year: EUR_2010
# MAOP: 15 MPa (all tests)

validation_summary:
  model: Knoope 2014 Detailed (physics-based decomposition)
  total_benchmarks: 6
  total_test_points: 19
  pass_rate: "19/19 (100%)"
  known_biases:
    - "Knoope uses FERC-derived US labor rates (825 EUR/m2 onshore), ~2x European actuals"
    - "Flat 35 MEUR offshore labor regardless of pipe length (limited data in Knoope 2014)"
    - "Model base year EUR_2010 vs benchmarks in EUR_2020-2023"
    - "Material costs optimized for X120 grade in all cases (highest yield strength)"

benchmarks:

  # =========================================================================
  # 1. Bennaes et al. (2024) — German-Norwegian corridor study
  # =========================================================================
  bennaes_2024:
    source: "Bennaes et al. (2024), Table from economics-corpus-analysis.md Section 1.3"
    description: "Onshore pipeline construction cost rates, German-Norwegian corridor"
    benchmark_year: EUR_2023
    comparison_type: "onshore CAPEX per km"
    tolerance: "factor of 3.5 (0.3 < ratio < 3.5)"
    systematic_bias: "Model runs 1.4-3.0x Bennaes, growing with diameter"
    bias_explanation: >
      Knoope's FERC-based labor (825 EUR/m2) is derived from US pipeline construction
      data, which is ~2x European rates. Labor is 60-70% of onshore CAPEX.
      Combined with base-year gap (EUR_2010 vs EUR_2023) and scope differences
      (Knoope includes ROW + 25% miscellaneous markup), a systematic high bias is expected.
    points:
      - {diameter_m: 0.2, model_keur_km: 767, benchmark_keur_km: 565, ratio: 1.36, grade: X120, status: PASS}
      - {diameter_m: 0.3, model_keur_km: 1129, benchmark_keur_km: 605, ratio: 1.87, grade: X120, status: PASS}
      - {diameter_m: 0.4, model_keur_km: 1503, benchmark_keur_km: 661, ratio: 2.27, grade: X120, status: PASS}
      - {diameter_m: 0.5, model_keur_km: 1891, benchmark_keur_km: 733, ratio: 2.58, grade: X120, status: PASS}
      - {diameter_m: 0.6, model_keur_km: 2291, benchmark_keur_km: 821, ratio: 2.79, grade: X120, status: PASS}
      - {diameter_m: 0.7, model_keur_km: 2703, benchmark_keur_km: 925, ratio: 2.92, grade: X120, status: PASS}
      - {diameter_m: 0.8, model_keur_km: 3129, benchmark_keur_km: 1045, ratio: 2.99, grade: X120, status: PASS}
      - {diameter_m: 0.9, model_keur_km: 3568, benchmark_keur_km: 1181, ratio: 3.02, grade: X120, status: PASS}
      - {diameter_m: 1.0, model_keur_km: 4019, benchmark_keur_km: 1333, ratio: 3.02, grade: X120, status: PASS}

  # =========================================================================
  # 2. Northern Lights Phase 1 (2020) — Real NCS pipeline contract
  # =========================================================================
  northern_lights:
    source: "Northern Lights Phase 1 pipeline contract (Subsea 7 EPCI)"
    description: "~100 km offshore, 12-16 inch (0.324m OD), NOK 500M contract"
    benchmark_year: EUR_2020
    comparison_type: "offshore CAPEX total and per km"
    tolerance: "model > 50% of NL contract (lower bound), model < 5x NL contract (upper bound)"
    notes: >
      NL contract is known to be anomalously low: competitive bid, benign seabed
      conditions, NCS mobilization advantages. Generic cost models should produce
      higher estimates. Model is 14% above NL contract — excellent agreement.
    model_parameters:
      od_m: 0.324
      length_km: 100.0
      maop_mpa: 15.0
      is_offshore: true
      ncs_labor_factor: 1.0
    results:
      model_total_meur: 54.9
      model_eur_per_km: 549351
      benchmark_total_meur: 48.0
      benchmark_eur_per_km: 480000
      ratio: 1.14
      status: PASS

  # =========================================================================
  # 3. Snohvit CO2 Pipeline (2007) — Historical NCS pipeline
  # =========================================================================
  snohvit:
    source: "Teir 2010, Snohvit CO2 injection project"
    description: "160 km offshore, 8 inch (0.219m OD), completed ~2007"
    benchmark_year: EUR_2007
    comparison_type: "offshore CAPEX total (pipeline-only estimate)"
    tolerance: "factor of 3 (0.33 < ratio < 3.0)"
    notes: >
      Total pipe + well: ~1 bn NOK ~ EUR 125M. Pipeline-only estimate: ~EUR 100M (80%).
      Model produces 52.4 MEUR, about half the estimate. The flat 35 MEUR offshore
      labor in Knoope may underestimate for a 160 km pipeline, but ratio is within bounds.
    model_parameters:
      od_m: 0.219
      length_km: 160.0
      maop_mpa: 15.0
      is_offshore: true
      ncs_labor_factor: 1.0
    results:
      model_total_meur: 52.4
      benchmark_total_meur: 100.0
      ratio: 0.52
      status: PASS

  # =========================================================================
  # 4. CO2Europipe FP7 — Rule of thumb (64,000 EUR/inch/km)
  # =========================================================================
  co2europipe:
    source: "CO2Europipe FP7 project, economics-corpus-analysis.md Section 3.3"
    description: "Rule of thumb: ~64,000 EUR/inch/km for offshore pipelines"
    benchmark_year: "pre-2010"
    comparison_type: "offshore CAPEX total"
    tolerance: "factor of 3 (0.3 < ratio < 3.0)"
    notes: >
      Model runs 38-70% of CO2Europipe rule. The flat offshore labor (35 MEUR)
      in Knoope is independent of diameter/length, while the EUR/inch/km rule
      scales linearly with both. For large-diameter long pipelines (20in x 200km),
      the rule gives much higher costs than the physics-based model.
    points:
      - diameter_inches: 12
        length_km: 100
        model_meur: 53.7
        benchmark_meur: 76.8
        ratio: 0.70
        status: PASS
      - diameter_inches: 16
        length_km: 100
        model_meur: 60.9
        benchmark_meur: 102.4
        ratio: 0.60
        status: PASS
      - diameter_inches: 20
        length_km: 200
        model_meur: 97.2
        benchmark_meur: 256.0
        ratio: 0.38
        status: PASS

  # =========================================================================
  # 5. d'Amore et al. (2021) — EU transport cost ranges
  # =========================================================================
  damore_2021:
    source: "d'Amore et al. (2021), economics-corpus-analysis.md Section 1.4"
    description: "Offshore transport costs by flow bin, EUR/km/tCO2"
    benchmark_year: "~2020"
    comparison_type: "pipeline CAPEX vs lifetime levelized transport cost"
    tolerance: "CAPEX between 5% and 100% of lifetime cost"
    notes: >
      d'Amore gives levelized transport cost including pipeline + compression +
      O&M, amortized over lifetime. Our pipeline-only CAPEX should be a fraction.
      Model CAPEX = 20% of d'Amore lifetime cost — reasonable split between
      pipeline CAPEX and total transport costs.
    test_case:
      flow_mtpa: 5.0
      length_km: 100.0
      lifetime_yr: 30
      damore_rate_eur_per_km_per_tco2: 0.0235
      od_m: 0.508  # ~20 inch for 5 Mt/yr
    results:
      model_capex_meur: 70
      benchmark_lifetime_meur: 352
      capex_fraction: 0.200
      status: PASS

  # =========================================================================
  # 6. Oeuvray et al. (2024) — Swiss corridor regression
  # =========================================================================
  oeuvray_2024:
    source: "Oeuvray et al. (2024), Eq. 41 (R²=0.995)"
    description: "Route-specific regression: UC = 38.2 * d^0.18 * m_CO2^(-0.58) + 0.01"
    benchmark_year: EUR_2021
    comparison_type: "pipeline CAPEX vs lifetime levelized transport (directional only)"
    tolerance: "CAPEX between 0.5% and 50% of lifetime transport cost"
    notes: >
      Oeuvray is a Swiss corridor study with route-specific factors. The regression
      output (EUR/t) includes amortization, O&M, compression, and insurance.
      Our pipeline-only CAPEX at 1.3% of Oeuvray lifetime cost is low but
      physically reasonable given the broad scope of Oeuvray's levelized cost.
    test_case:
      distance_km: 100.0
      flow_mtpa: 4.0
      lifetime_yr: 30
      oeuvray_uc_eur_per_t: 39.17
      od_m: 0.406  # ~16 inch for 4 Mt/yr
    results:
      model_capex_meur: 61
      benchmark_lifetime_meur: 4701
      capex_fraction: 0.013
      status: PASS

  # =========================================================================
  # Internal model consistency
  # =========================================================================
  model_consistency:
    description: "Knoope simple (power-law) vs detailed (physics-based) comparison"
    tolerance: "factor of 3 (0.3 < ratio < 3.0)"
    notes: >
      The simple model uses a power-law regression while the detailed model
      uses physics-based wall thickness + grade optimization. Good agreement
      at 12 inch (ratio 0.89), but divergence at 20 inch x 200 km (ratio 0.36)
      because the flat 35 MEUR offshore labor in detailed doesn't scale with length.
    points:
      - description: "12 inch x 100 km offshore"
        simple_meur: 61.5
        detailed_meur: 54.9
        ratio: 0.89
        status: PASS
      - description: "20 inch x 200 km offshore"
        simple_meur: 272.7
        detailed_meur: 97.2
        ratio: 0.36
        status: PASS

# =========================================================================
# Identified model weaknesses
# =========================================================================
identified_weaknesses:
  - id: W1
    severity: HIGH
    description: >
      Onshore labor cost (825 EUR/m2 from FERC data) is ~2-3x European actuals.
      For NCS applications this is less critical (most NCS pipelines are offshore),
      but for onshore segments it will overestimate.
    recommendation: >
      Consider an NCS/European labor adjustment factor for onshore segments,
      or replace FERC labor with European data (e.g., Bennaes rates).

  - id: W2
    severity: MEDIUM
    description: >
      Offshore labor is a flat 35 MEUR regardless of pipeline length or diameter.
      This underestimates long pipelines (Snohvit 160km: ratio 0.52) and
      overestimates short pipelines.
    recommendation: >
      Replace flat offshore labor with a per-km rate (e.g., derive from
      Northern Lights: 480 kEUR/km implies ~350 kEUR/km labor component).

  - id: W3
    severity: LOW
    description: >
      Steel grade optimization always selects X120 at 15 MPa MAOP for all
      diameters tested. This minimizes wall thickness and material cost.
      In practice, X120 may not be available for all pipe sizes.
    recommendation: >
      Consider adding diameter-dependent grade availability constraints.
