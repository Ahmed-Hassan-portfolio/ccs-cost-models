# Composite escalation index component weights for future-year CCS cost projections.
#
# Purpose: Project costs forward from base_year (2024) to construction years 2026-2030+.
# NOT used for historical base-year conversion (that uses CEPCI per escalation.py).
#
# Weights derived from ZEP 2011 Table 4 (offshore storage cost breakdown) and NETL
# Back-End_Cost Items analysis, cross-referenced with Knoope 2014 pipeline material
# fractions and Sodir NCS cost statistics.
#
# Implementation plan reference: Section 2.4

component_weights:
  labor:
    weight: 0.40
    description: "Petroleum engineer and offshore worker labor costs"
    derivation: >
      Average of ZEP 2011 Table 4 well cost labor share (~35-45%) and
      NETL cost_items.csv labor line items as fraction of total (~38%).
      Wells dominate CCS storage CAPEX (40-70% per ZEP), and labor is
      ~40% of well construction cost (Khosravanian 2021: drill 41%, rig 14%).
    indices:
      primary: "SSB 11418 petroleum engineer wages"
      backup: "SSB 08651 construction cost index (labor component)"
    source_files:
      - "data/ssb/ssb_11418_wages_by_industry.csv"

  steel_materials:
    weight: 0.30
    description: "Steel, casing, tubulars, pipeline materials, CRA alloys"
    derivation: >
      Knoope 2014: pipeline material is 30-50% of onshore pipeline cost,
      20-40% of offshore (higher labor share offshore). NETL casing/tubular
      items ~25-35% of well cost. Weighted average across well + pipeline
      gives ~30% of total CCS cost.
    indices:
      primary: "World Bank steel price index (commodity pink sheet)"
      backup: "SSB 12462 PPI oil/gas extraction services"
    source_files:
      - "data/ssb/ssb_12462_ppi_og_services.csv"

  vessel_equipment:
    weight: 0.30
    description: "Drilling rig day rates, installation vessels, marine spread"
    derivation: >
      ZEP 2011: rig cost is ~30-40% of well drilling cost. Installation
      vessels for subsea, pipeline, and monitoring operations. Sodir resource
      reports show NCS day rates at NOK 7-8.5M/day (semi-submersible).
      Combined rig + vessel share ~30% of total CCS storage CAPEX.
    indices:
      primary: "NCS rig rate trend (Sodir resource reports / Rystad)"
      backup: "SSB 12462 PPI oil/gas extraction services"
    source_files:
      - "data/ssb/ssb_12462_ppi_og_services.csv"

weights_sum: 1.0
base_year: 2024

# Scenario bounds for future projections (Section 2.4)
scenario_bounds:
  p10_low:
    annual_real_growth: 0.015  # 1.5%/yr
    description: "Low escalation — stable market, post-boom correction"
    basis: "SSB 08651 long-run average (1978-2024) ~2%/yr, minus margin"
  p50_central:
    description: "Composite index — weighted average of component growth rates"
    basis: "Component-weighted projection from SSB indices"
  p90_high:
    annual_real_growth: 0.040  # 4.0%/yr
    description: "High escalation — tight market, NCS cost inflation (Rystad 2022)"
    basis: "Rystad: 12-17% increase in NCS prices 2021-2022; 4%/yr is sustained high"

# Validation requirement (Section 2.4)
validation:
  requirement: "Back-test composite index against published UCCI values through 2017"
  acceptance: "Correlation > 0.7; if not, fall back to scenario approach"
  status: "Scenario approach used — UCCI historical data not publicly available"
  note: >
    IHS CERA UCCI is proprietary. Q4 2017 value available from press releases
    but insufficient for time-series correlation. The P10/P50/P90 scenario
    approach provides robust uncertainty bounds without UCCI dependency.
